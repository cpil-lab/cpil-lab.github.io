# Decap CMS writes content changes to GitHub.
backend:
  name: github
  repo: cpil-lab/cpil-lab.github.io
  branch: main
  squash_merges: true
  open_authoring: true
  site_domain: cpil-lab.github.io
  base_url: https://cpil-lab-github-io.pages.dev
  auth_endpoint: /api/auth

# Keep this enabled so CMS edits are reviewed as pull requests before publication.
# Also protect the main branch in GitHub and require at least one approving PR review.
publish_mode: editorial_workflow

# Open authoring lets GitHub users without direct write access propose content
# changes from forks. Maintainers review and merge those changes as PRs.

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: "https://cpil-lab.github.io"
display_url: "https://cpil-lab.github.io"
logo_url: "/images/brand/cpil-lab-concept.png"

collections:
  - name: "people"
    label: "People"
    label_singular: "Person"
    folder: "src/content/people"
    create: true
    identifier_field: "name"
    slug: "{{slug}}"
    format: "frontmatter"
    summary: "{{name}} - {{role}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }
      - label: "Role"
        name: "role"
        widget: "select"
        options:
          - "Principal Investigator"
          - "Faculty / Senior Researchers"
          - "PhD Students"
          - "Undergraduate / Master's Students"
          - "Postdocs"
          - "Visiting Scholars"
          - "Interns"
          - "Alumni"
      - { label: "Affiliation", name: "affiliation", widget: "string" }
      - label: "Photo"
        name: "photo"
        widget: "image"
        required: false
        choose_url: false
        media_folder: "/public/images/people"
        public_folder: "/images/people"
        media_library:
          config:
            max_file_size: 2097152
        hint: "Upload a square headshot when possible. The CMS stores people photos under public/images/people and writes /images/people/<filename> into this field."
      - { label: "Email", name: "email", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - label: "Research Interests"
        name: "interests"
        widget: "list"
        required: false
        field: { label: "Interest", name: "interest", widget: "string" }
      - { label: "Short Bio", name: "bio", widget: "text" }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", default: 100 }

  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "src/content/projects"
    create: true
    identifier_field: "title"
    slug: "{{slug}}"
    format: "frontmatter"
    summary: "{{title}} - {{status}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Description", name: "shortDescription", widget: "text" }
      - { label: "Long Description", name: "longDescription", widget: "text" }
      - label: "Leaders"
        name: "leaders"
        widget: "list"
        required: false
        field: { label: "Leader", name: "leader", widget: "string" }
      - label: "Members"
        name: "members"
        widget: "list"
        required: false
        field: { label: "Member", name: "member", widget: "string" }
      - label: "Collaborators"
        name: "collaborators"
        widget: "list"
        required: false
        field: { label: "Collaborator", name: "collaborator", widget: "string" }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - label: "Links"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - label: "Related Publications"
        name: "publications"
        widget: "list"
        required: false
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Authors", name: "authors", widget: "string", required: false }
          - { label: "Venue", name: "venue", widget: "string", required: false }
          - { label: "Year", name: "year", widget: "number", value_type: "int", required: false }
          - { label: "URL", name: "url", widget: "string", required: false }
          - { label: "Summary", name: "summary", widget: "text", required: false }
      - label: "Impact Holders"
        name: "impactHolders"
        widget: "list"
        required: false
        hint: "People, organizations, communities, or user groups affected by or collaborating around this project."
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Role", name: "role", widget: "string", required: false }
          - { label: "URL", name: "url", widget: "string", required: false }
          - { label: "Summary", name: "summary", widget: "text", required: false }
      - label: "Status"
        name: "status"
        widget: "select"
        default: "active"
        options:
          - "active"
          - "completed"
      - { label: "Featured on Home", name: "featured", widget: "boolean", default: false }
      - { label: "Sort Order", name: "order", widget: "number", value_type: "int", default: 100 }
      - { label: "Project Page Body", name: "body", widget: "markdown", required: false }

  - name: "publications"
    label: "Publications"
    label_singular: "Publication"
    folder: "src/content/publications"
    create: true
    identifier_field: "title"
    slug: "{{year}}-{{slug}}"
    format: "frontmatter"
    summary: "{{year}} - {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Authors"
        name: "authors"
        widget: "list"
        field: { label: "Author", name: "author", widget: "string" }
      - { label: "Venue", name: "venue", widget: "string" }
      - { label: "Year", name: "year", widget: "number", value_type: "int" }
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "journal article"
          - "conference paper"
          - "workshop paper"
          - "preprint"
          - "book chapter"
          - "thesis"
          - "demo"
      - { label: "Abstract", name: "abstract", widget: "text" }
      - label: "Badges"
        name: "badges"
        widget: "list"
        required: false
        hint: "Examples: ICLR 2026, ICML 2026, Spotlight, Oral, Selected"
        field: { label: "Badge", name: "badge", widget: "string" }
      - label: "Links and BibTeX"
        name: "links"
        widget: "object"
        fields:
          - { label: "Paper URL", name: "paper", widget: "string", required: false }
          - { label: "Code URL", name: "code", widget: "string", required: false }
          - { label: "Project URL", name: "project", widget: "string", required: false }
          - { label: "BibTeX", name: "bibtex", widget: "text", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false }

  - name: "news"
    label: "News"
    label_singular: "News Item"
    folder: "src/content/news"
    create: true
    identifier_field: "title"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    format: "frontmatter"
    summary: "{{date}} - {{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Short Title", name: "shortTitle", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Display Date", name: "displayDate", widget: "string", required: false, hint: "Use this for year-only labels such as 2026." }
      - { label: "Category", name: "category", widget: "string", required: false }
      - label: "Tags"
        name: "tags"
        widget: "list"
        required: false
        field: { label: "Tag", name: "tag", widget: "string" }
      - { label: "Summary", name: "summary", widget: "text" }
      - { label: "Source Type", name: "sourceType", widget: "string", required: false }
      - { label: "Source URL", name: "sourceUrl", widget: "string", required: false }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "External Link", name: "link", widget: "string", required: false }
